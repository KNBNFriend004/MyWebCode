name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows you to click "Run Workflow" manually on GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # We removed the 'cache: npm' here to prevent lockfile conflicts

      - name: Install Dependencies Automatically
        # This will generate a temporary package-lock.json on the runner
        run: npm install 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission
        run: chmod +x android/gradlew

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          
