name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Added a timeout so a "stuck" build doesn't waste your minutes
    timeout-minutes: 30 

    env:
      # Fixes "Out of Memory" errors during heavy compilation
      NODE_OPTIONS: "--max-old-space-size=4096"
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          # Ensure expo-cli is available for the prebuild step
          npm install -g expo-cli

      # FIX: Solves the "Could not find org.asyncstorage" error
      - name: Configure Android Project
        run: |
          mkdir -p android
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "nodeModulesDir=$(pwd)/node_modules" >> android/gradle.properties
          # Fix for certain Gradle versions needing higher permissions
          touch android/settings.gradle

      - name: Prebuild Android
        run: npx expo prebuild --platform android --no-install

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant permission
        run: chmod +x android/gradlew

      - name: Build APK
        id: build_apk
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace

      # Only uploads if the build actually succeeded
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

      # Helpful error summary if things go wrong
      - name: Report failure
        if: failure()
        run: echo "Build failed. Check the 'Build APK' step logs for Java/Gradle errors."
        
