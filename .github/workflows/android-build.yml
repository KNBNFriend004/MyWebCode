name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Forces GitHub to stop the job if it hangs past 45 minutes
    timeout-minutes: 45 

    env:
      # Gives Node.js more memory to prevent JavaScript heaps out of memory
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install NPM dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Android Native Code (Prebuild)
        # --clean ensures we start fresh and don't cache broken files
        run: npx expo prebuild --platform android --clean

      - name: Safe Async Storage Patch
        # Appends the missing repository link to the very end of the file safely
        run: |
          echo "allprojects { repositories { maven { url \"\$rootDir/../node_modules/@react-native-async-storage/async-storage/android/libs\" } } }" >> android/build.gradle

      - name: Grant Gradle Permissions
        run: chmod +x android/gradlew

      - name: Build APK (Memory Optimized)
        # --no-daemon: Stops ghost processes from eating RAM
        # --max-workers=2: Prevents the server from freezing by limiting CPU cores
        # --console=plain: Stops massive log outputs that freeze the GitHub interface
        # -Xmx2048m: Strictly limits Gradle's memory footprint so the runner doesn't crash
        run: |
          cd android
          ./gradlew assembleRelease \
            --no-daemon \
            --max-workers=2 \
            --console=plain \
            -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # Using a wildcard just in case the filename varies slightly
          path: android/app/build/outputs/apk/release/*.apk
          
